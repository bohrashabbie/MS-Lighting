# Production stack: Next.js web app behind Nginx (with Let's Encrypt SSL).
# The CMS API + Postgres + S3 run separately (alburhancms).
#
#   cp .env.example .env   # set DOMAIN + NEXT_PUBLIC_* first
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Then issue certificates (one time) — see DEPLOY.md.
services:
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL:-http://13.60.4.75:8002}
        NEXT_PUBLIC_S3_BASE_URL: ${NEXT_PUBLIC_S3_BASE_URL:-https://alburhan-asset.s3.eu-north-1.amazonaws.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.example.com}
        NEXT_PUBLIC_ASSET_BASE_URL: ${NEXT_PUBLIC_ASSET_BASE_URL:-https://alburhan-asset.s3.eu-north-1.amazonaws.com/site}
    image: ms-lighting-web:latest
    container_name: ms-lighting-web
    restart: unless-stopped
    expose:
      - "3001"
    # Published on loopback so a host-level nginx (outside Docker) can proxy
    # to 127.0.0.1:3001. The dockerized nginx below reaches it via the
    # compose network either way. Not exposed publicly.
    ports:
      - "127.0.0.1:3001:3001"

  nginx:
    image: nginx:alpine
    container_name: ms-lighting-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-example.com}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    container_name: ms-lighting-certbot
    volumes:
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    # Runs on demand (see DEPLOY.md); idle otherwise.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; done'"
